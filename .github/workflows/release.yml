name: Cross-Platform Release

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string
      source_ref:
        description: Branch, commit, or existing tag to release from when manually dispatching
        required: false
        default: main
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: cross-platform-release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.tag }}
  cancel-in-progress: false

env:
  FRONTEND_DIR: frontend
  NEXT_PUBLIC_APP_STAGE: production
  NEXT_PUBLIC_PRODUCTION_API_URL: ${{ secrets.NEXT_PUBLIC_PRODUCTION_API_URL || 'https://plantify.limarise.com/api' }}

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      created_tag: ${{ steps.meta.outputs.created_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          created_tag=false

          if [ "$EVENT_NAME" = "workflow_run" ]; then
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
            if [ -z "${LATEST_TAG:-}" ]; then
              release_tag="v0.1.0"
            else
              if [[ ! "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "Latest tag '$LATEST_TAG' is not semver (vMAJOR.MINOR.PATCH)." >&2
                exit 1
              fi
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              release_tag="v${major}.${minor}.$((patch + 1))"
            fi
            source_ref="$SOURCE_SHA"
          else
            release_tag="$INPUT_TAG"
            source_ref="${INPUT_SOURCE_REF:-main}"
          fi

          if git rev-parse -q --verify "refs/tags/$release_tag" >/dev/null 2>&1; then
            checkout_ref="refs/tags/$release_tag"
          else
            git tag -a "$release_tag" "$source_ref" -m "Release $release_tag"
            git push origin "refs/tags/$release_tag"
            checkout_ref="refs/tags/$release_tag"
            created_tag=true
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Release preparation complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.meta.outputs.release_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Checkout ref: ${{ steps.meta.outputs.checkout_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Created new tag: ${{ steps.meta.outputs.created_tag }}" >> "$GITHUB_STEP_SUMMARY"

  web-assets:
    name: Web / Assets
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Build static export
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          PLATFORM_TARGET: static
        run: bun run build:static

      - uses: actions/upload-artifact@v4
        with:
          name: web-assets
          path: frontend/out
          retention-days: 3

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: [prepare, web-assets]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: frontend/out

      - name: Sync Capacitor
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ ! -d android ]; then bunx cap add android; fi
          bunx cap sync android

      - name: Prepare signing keystore
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore_path="android/app/plantify-release.jks"
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
            {
              echo "ANDROID_KEYSTORE_PATH=$keystore_path"
              echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          else
            keytool -genkeypair -v \
              -keystore "$keystore_path" -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            {
              echo "ANDROID_KEYSTORE_PATH=$keystore_path"
              echo "ANDROID_KEYSTORE_PASSWORD=android"
              echo "ANDROID_KEY_ALIAS=androiddebugkey"
              echo "ANDROID_KEY_PASSWORD=android"
            } >> "$GITHUB_ENV"
          fi

      - name: Build Android release
        working-directory: ${{ env.FRONTEND_DIR }}/android
        run: ./gradlew assembleRelease bundleRelease

      - name: Sign and stage artifacts
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          set -euo pipefail
          build_tools=$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort | tail -n1)
          apk_in="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          apk_tmp="android/app/build/outputs/apk/release/app-release-aligned.apk"
          aab_in="android/app/build/outputs/bundle/release/app-release.aab"
          apk_out="android/app/build/outputs/apk/release/plantify-${RELEASE_TAG}-android.apk"
          aab_out="android/app/build/outputs/bundle/release/plantify-${RELEASE_TAG}-android.aab"

          "$build_tools/zipalign" -f -p 4 "$apk_in" "$apk_tmp"
          "$build_tools/apksigner" sign \
            --ks "$ANDROID_KEYSTORE_PATH" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out "$apk_out" "$apk_tmp"
          cp "$aab_in" "$aab_out"
          jarsigner \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            "$aab_out" "$ANDROID_KEY_ALIAS"

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.RELEASE_TAG }}
          path: |
            frontend/android/app/build/outputs/apk/release/plantify-*.apk
            frontend/android/app/build/outputs/bundle/release/plantify-*.aab
          retention-days: 3
          compression-level: 6

  ios:
    name: iOS
    runs-on: macos-latest
    needs: [prepare, web-assets]
    if: ${{ vars.ENABLE_IOS_RELEASE == 'true' }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: frontend/out

      - name: Sync Capacitor
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ ! -d ios ]; then bunx cap add ios; fi
          bunx cap sync ios

      - name: Install CocoaPods
        working-directory: ${{ env.FRONTEND_DIR }}/ios/App
        run: pod install

      - name: Import signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p "$RUNNER_TEMP/plantify" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP/plantify" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/plantify-cert.p12"
          security import "$RUNNER_TEMP/plantify-cert.p12" -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/plantify.mobileprovision"

      - name: Write export options
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key><dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key><string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict></plist>
          PLIST

      - name: Archive iOS app
        working-directory: ${{ env.FRONTEND_DIR }}/ios/App
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
        run: |
          xcodebuild \
            -workspace App.xcworkspace -scheme App \
            -configuration Release -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Plantify.xcarchive" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            archive

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Plantify.xcarchive" \
            -exportPath "$RUNNER_TEMP/ios-release" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-${{ env.RELEASE_TAG }}
          path: ${{ runner.temp }}/ios-release/*.ipa
          retention-days: 3
          compression-level: 6

  desktop:
    name: Desktop / ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    needs: [prepare, web-assets]
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux system dependencies
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: bun install --frozen-lockfile

      - name: Download web assets
        uses: actions/download-artifact@v4
        with:
          name: web-assets
          path: frontend/out

      - name: Build Tauri desktop bundle
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          NEXT_PUBLIC_APP_STAGE: production
          NEXT_PUBLIC_PRODUCTION_API_URL: ${{ env.NEXT_PUBLIC_PRODUCTION_API_URL }}
        run: bun run tauri:build -- --target ${{ matrix.target }}

      - name: Create portable Windows executable
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          $releaseDir = "frontend/src-tauri/target/${{ matrix.target }}/release"
          $portableDir = "$releaseDir/bundle/portable"
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          $src = Get-ChildItem "$releaseDir" -File -Filter '*.exe' |
            Where-Object { $_.Name -notmatch 'setup|unins|tauri|cargo|vc_redist' } |
            Select-Object -First 1
          if ($src) {
            Copy-Item $src.FullName "$portableDir/plantify-${env:RELEASE_TAG}-windows-x64-portable.exe" -Force
          }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifact }}-${{ env.RELEASE_TAG }}
          if-no-files-found: ignore
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.rpm
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*.tar.gz
          retention-days: 3
          compression-level: 6

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [prepare, android, ios, desktop]
    if: ${{ always() && needs.prepare.result == 'success' }}
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download Android artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: android-*
          path: release-assets/android

      - name: Download iOS artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: ios-*
          path: release-assets/ios

      - name: Download desktop artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets/desktop

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/published

          if [ -d release-assets/android ]; then
            while IFS= read -r file; do
              cp -f "$file" "release-assets/published/$(basename "$file")"
            done < <(find release-assets/android -type f \( -name "*.apk" -o -name "*.aab" \) | sort)
          fi

          if [ -d release-assets/ios ]; then
            ipa_file=$(find release-assets/ios -type f -name "*.ipa" | head -n1 || true)
            if [ -n "${ipa_file:-}" ]; then
              cp -f "$ipa_file" "release-assets/published/plantify-${RELEASE_TAG}-ios-arm64.ipa"
            fi
          fi

          if [ -d release-assets/desktop ]; then
            while IFS= read -r file; do
              rel="${file#release-assets/desktop/}"
              artifact_dir="${rel%%/*}"
              platform="${artifact_dir#desktop-}"
              platform="${platform%-${RELEASE_TAG}}"
              base=$(basename "$file")
              ext="${base##*.}"
              [[ "$base" == *.tar.gz ]] && ext="tar.gz"
              [[ "$base" == *.AppImage ]] && ext="AppImage"
              flavor=""
              [[ "$base" == *portable* ]] && flavor="-portable"
              cp -f "$file" "release-assets/published/plantify-${RELEASE_TAG}-${platform}${flavor}.${ext}"
            done < <(find release-assets/desktop -type f \( \
              -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" \
              -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.tar.gz" \
            \) | sort)
          fi

          mapfile -t checksum_files < <(find release-assets/published -maxdepth 1 -type f ! -name 'checksums.txt' | sort)
          if [ "${#checksum_files[@]}" -gt 0 ]; then
            printf '%s\n' "${checksum_files[@]}" | xargs sha256sum > release-assets/published/checksums.txt
            ls -lh release-assets/published
          else
            echo "No publishable artifacts found; skipping checksum generation."
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') || contains(env.RELEASE_TAG, 'rc') }}
          files: release-assets/published/*
