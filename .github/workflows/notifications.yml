name: Telegram Notifications

on:
  workflow_run:
    workflows:
      - "Cross-Platform Release"
    types: [completed]

concurrency:
  group: telegram-notify-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  notify:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.workflow_run.name == 'Cross-Platform Release'

    steps:
      - name: Validate Telegram secrets
        id: gate
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Telegram secrets missing, skipping notification."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build message
        if: steps.gate.outputs.skip != 'true'
        id: msg
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
        run: |
          set -euo pipefail

          case "${CONCLUSION}" in
            success) ICON="✅"; LABEL="Successful" ;;
            failure) ICON="❌"; LABEL="Failed" ;;
            cancelled) ICON="⚠️"; LABEL="Cancelled" ;;
            timed_out) ICON="⏰"; LABEL="Timed Out" ;;
            *) ICON="ℹ️"; LABEL="${CONCLUSION}" ;;
          esac

          SHORT_SHA=$(printf '%.7s' "${SHA}")
          COMMIT_URL="https://github.com/${REPO}/commit/${SHA}"

          {
            echo "text<<EOF"
            echo "${ICON} *${REPO}* - ${LABEL}"
            echo ""
            echo "*Workflow:* ${WORKFLOW_NAME} (#${RUN_NUMBER})"
            echo "*Branch:* ${BRANCH}"
            echo "*Commit:* [${SHORT_SHA}](${COMMIT_URL})"
            echo "*Actor:* ${ACTOR}"
            echo ""
            echo "[View run details](${RUN_URL})"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram message
        if: steps.gate.outputs.skip != 'true'
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ steps.msg.outputs.text }}
        run: |
          set -euo pipefail

          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE_TEXT" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}')

          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
