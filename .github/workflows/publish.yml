name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  VPS_APP_DIR: /root/plantify

defaults:
  run:
    shell: sh

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend test dependencies
        run: |
          python -m pip install --upgrade pip
          grep -Ev '^(torch|torchvision)==|^$' backend/requirements.txt > /tmp/requirements-ci.txt
          python -m pip install -r /tmp/requirements-ci.txt

      - name: Validate production settings policy
        working-directory: backend
        env:
          APP_ENV: production
          SECRET_KEY: this-is-a-ci-validation-secret-key-with-32-chars
          ROLE_ELEVATION_CODE: this-is-a-ci-role-elevation-code
          CORS_ORIGINS: https://plantify.example.com
          SQLITE_PATH: /tmp/plantify-ci.db
        run: python -c "from app.core.config import Settings; Settings()"

      - name: Validate backend import safety without ML extras
        working-directory: backend
        run: python -c "from app.main import build_security_headers; assert callable(build_security_headers)"

      - name: Run backend integration tests
        working-directory: backend
        run: python -m pytest tests -q --junitxml=/tmp/backend-pytest.xml

      - name: Compress backend pytest report
        if: always()
        run: gzip -9 -f /tmp/backend-pytest.xml

      - name: Upload backend pytest report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: publish-backend-pytest-${{ github.run_id }}-${{ github.run_attempt }}
          retention-days: 14
          compression-level: 9
          path: /tmp/backend-pytest.xml.gz

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.2.23"

      - name: Restore Bun package cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Lint and build frontend
        run: |
          cd frontend
          bun install --frozen-lockfile
          bun run lint
          bun run build

      - name: Enforce frontend lockfile consistency
        run: |
          if [ -f frontend/package-lock.json ]; then
            echo "frontend/package-lock.json detected. Use Bun lockfile only for this project." >&2
            exit 1
          fi

          git diff --exit-code -- frontend/bun.lock

      - name: Validate production Compose file
        run: docker compose -f docker-compose.prod.yml config > /dev/null

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gates
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_prefix: ${{ steps.vars.outputs.image_prefix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Prepare image metadata
        id: vars
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE_PREFIX="${{ env.REGISTRY }}/${OWNER_LOWER}/${REPO_LOWER}"
          SHORT_SHA=$(printf '%.7s' "${GITHUB_SHA}")
          echo "image_prefix=${IMAGE_PREFIX}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log into GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          pull: true
          build-args: |
            GITHUB_SHA=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            MODEL_VERSION_PREFIX=ci
          tags: |
            ${{ steps.vars.outputs.image_prefix }}-backend:latest
            ${{ steps.vars.outputs.image_prefix }}-backend:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          pull: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
            NEXT_PUBLIC_BACKEND_ORIGIN=http://backend:8000
          tags: |
            ${{ steps.vars.outputs.image_prefix }}-frontend:latest
            ${{ steps.vars.outputs.image_prefix }}-frontend:${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

