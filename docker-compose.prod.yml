services:
  backend:
    image: ${GHCR_IMAGE_PREFIX}-backend:${IMAGE_TAG:-latest}
    container_name: plantify-backend
    env_file:
      - path: backend/.env
        required: false
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - plantify_data:/data
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: plantify-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  frontend:
    image: ${GHCR_IMAGE_PREFIX}-frontend:${IMAGE_TAG:-latest}
    container_name: plantify-frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  plantify_data:
  ollama_data:
